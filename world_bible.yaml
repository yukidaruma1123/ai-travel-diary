world:
  name: 霧鋼國（むこうこく）
  era: 蒸気機関と古神道が融合した時代。約200年前に「天鋼降ろし」と呼ばれる事象で空から金属の塊が降り注ぎ、それを動力源とする蒸気文明が急速に発展した。しかし古来からの精霊信仰も色濃く残り、機械と呪術が共存する独特の文化圏を形成している。
  calendar:
    months: 13
    month_names:
    - 睦鋼月
    - 如雲月
    - 弥霧月
    - 卯機月
    - 皐煙月
    - 水車月
    - 文燈月
    - 葉鉄月
    - 長笛月
    - 神鍛月
    - 霜歯月
    - 師走月
    - 閏影月
    current_month: 7
    season: 灯夏（とうか）— 蒸気灯が街を照らし、夜祭が続く季節
  geography:
    overview: 中央に巨大な「鋼心湖」を抱き、そこから七本の蒸気運河が放射状に伸びる。山岳地帯には古神殿が点在し、沿岸部には異国との交易港が栄える。空には時折「浮鉄鯨」と呼ばれる飛行船が悠然と横切る。
    regions:
    - id: koushin_lake
      name: 鋼心湖畔地区
      climate: 温暖湿潤・常に薄霧が漂う
      architecture: 煉瓦と真鍮の装飾が特徴的な三階建て町家。屋根には蒸気排出の煙突が林立
      specialty: 精密歯車細工・霧酒（きりざけ）
      secret: 湖底には沈んだ古代都市があり、満月の夜に水面下で光が明滅するという。潜った者は誰も戻らない
      locations:
      - id: asagiri_market
        name: 朝霧市場
        type: 市場
        description: 夜明け前から開く水上市場。小舟が連なり、鮮魚・歯車部品・呪符が同じ棚に並ぶ。湖から立ち昇る蒸気と商人たちの呼び声が混ざり合う。
        visual_mood: 乳白色の霧・真鍮色の朝日・木と金属の質感・活気ある群衆
        best_time: 薄明〜早朝
      - id: ougon_bridge
        name: 黄金絡繰橋
        type: 橋
        description: 湖を跨ぐ巨大な可動橋。蒸気動力で一日三回開閉し、その度に巨大歯車が軋む音が響く。橋上には茶屋や占い師の屋台が並ぶ。
        visual_mood: 夕焼け・錆びた黄金・巨大歯車・煙の筋・シルエット
        best_time: 夕刻の開閉時
      - id: chinmoku_shrine
        name: 沈黙神社
        type: 神殿
        description: 湖畔の崖に張り付くように建てられた古社。鳥居は半分水没し、社殿内では声を出すことが禁じられている。願掛けは専用の金属板を打ち鳴らして行う。
        visual_mood: 苔むした石・水面の反射・静寂・銀色の鈴・神秘的な薄闇
        best_time: 正午（日光が社殿を貫く時間）
    - id: kurogane_ridge
      name: 黒鉄嶺
      climate: 冷涼・強風・雷雲が多い
      architecture: 岩盤を削り出した要塞風建築。窓は小さく、壁には避雷の呪紋が刻まれている
      specialty: 天鋼鉱石・雷電蓄電器
      secret: 嶺の最高峰には「天からの使者」の骨格とされる巨大な金属構造体が埋まっている。調査隊は皆、記憶の一部を失って帰還する
      locations:
      - id: raikoumon
        name: 雷光門
        type: 関所
        description: 嶺への唯一の入口。門柱には常に電流が走り、青白い火花が散る。通行には鍛冶師組合の許可状が必要。
        visual_mood: 青白い電光・黒い岩肌・霧と稲妻・威圧感・金属の匂い
        best_time: 雷雲接近時（危険だが絶景）
      - id: tantetsu_village
        name: 鍛鉄郷
        type: 職人村
        description: 天鋼を加工する職人たちの集落。一日中槌音が響き、空は常に赤みを帯びた煙に覆われている。職人たちは言葉少なだが技を見せることには寛容。
        visual_mood: 赤熱する金属・飛び散る火花・汗と煤・力強さ・暖色の闇
        best_time: 深夜（溶鉱炉の光が最も美しい）
    - id: ranka_port
      name: 蘭華港
      climate: 亜熱帯・海風・スコールが多い
      architecture: 異国の様式と和風が混在。極彩色の看板・格子窓・吊り下げ提灯が特徴
      specialty: 香辛料・異国機械・翻訳呪符
      secret: 港の最古の灯台には「帰らずの扉」があり、特定の夜にのみ開く。その先は誰も知る者がいない異郷に繋がるという
      locations:
      - id: goshoku_street
        name: 五色街
        type: 繁華街
        description: 昼は商館と倉庫の街、夜は色とりどりの提灯が灯る歓楽街。異国語・方言・機械音が入り混じり、どこか猥雑で生命力に満ちている。
        visual_mood: 極彩色の提灯・雨に濡れた石畳・ネオン的色彩・喧騒・煙草の煙
        best_time: 日没直後〜深夜
      - id: kaikou_temple
        name: 海香寺
        type: 寺院
        description: 港を見下ろす丘の上に建つ異国風寺院。潮の香りの中で鐘が鳴り、船乗りたちが無事を祈る。本尊は機械仕掛けの観音像。
        visual_mood: 白壁と朱色・潮風・線香の煙・遠くに海・穏やかな午後
        best_time: 潮が満ちる午後
  culture:
    language_flavor: 古語調だが蒸気・金属関連の言葉は硬質でカタカナ交じり。敬語体系が複雑で、相手の「鋼位（こうい）」によって使い分ける
    currency: 歯銭（はせん）— 中央に小さな歯車が嵌め込まれた硬貨。上位貨幣は「輪金（りんきん）」と呼ばれる腕輪型
    greeting: 「良き歯車の巡りを」が一般的な挨拶。親しい間柄では「歯車、回ってるか？」
    taboos:
    - 天鋼を素手で触れること（精霊が宿るとされる）
    - 沈黙神社の境内で声を発すること
    - 死者の名を鋼製品に刻むこと
    festivals:
    - name: 輪廻燈祭（りんねとうさい）
      month: 7
      description: 亡き者の魂を導くため、歯車型の灯篭を湖に流す祭り。蒸気船が列をなし、湖面が無数の光で埋め尽くされる
    - name: 鋼降ろし祭
      month: 11
      description: 天鋼が降った日を記念する祭。鍛冶師たちが技を競い合い、最も美しい作品を神殿に奉納する
    food_culture: 発酵食品と燻製が主流。蒸気調理器具が普及し、「蒸し」の技法が発達。異国の香辛料も多く取り入れられている
    signature_foods:
    - name: 霧蒸し膳
      description: 湖魚と山菜を密閉容器で蒸し上げた料理。蓋を開けた瞬間、霧のような湯気と香りが立ち上る
      visual_mood: 白い蒸気・漆器の黒・魚の艶・山菜の緑・凝縮された香り
    - name: 歯車餅
      description: 歯車の形を模した求肥餅。中に真鍮色の餡が入っており、噛むとかすかに金属的な甘みが広がる
      visual_mood: 真鍮色の光沢・繊細な歯車模様・粉糖の白・手のひらサイズ
    - name: 黒鉄燻酒
      description: 嶺で採れる鉱水と燻した穀物で醸した黒い酒。鉄の香りがほのかに漂い、身体が芯から温まる
      visual_mood: 黒曜石のような液体・銅製の杯・立ち上る湯気・赤い炉の光
  narrator:
    name: 火繰マコト（ひくり まこと）
    background: 元は鋼心湖畔の時計職人だったが、師匠が謎の失踪を遂げたことをきっかけに旅に出る。左手には師匠から受け継いだ古い懐中時計を常に携帯している。時計は時折、存在しないはずの時刻を指す。
    personality: 観察眼が鋭く、皮肉屋だが根は人情深い。機械と同じくらい人の心の歯車にも興味がある。美味いものには素直に感動する
    goal: 師匠の失踪の謎を追うこと。そして師匠が探していた「十三番目の月の神殿」を見つけること
    writing_style: 簡潔で韻を踏んだ文体。五感の描写を重視し、特に音と匂いを細かく記す。時折、師匠の言葉や教えを引用する
    catchphrase: 「歯車は正直だ。噛み合わなければ、ちゃんと軋む」
  lore:
    creation_myth: 太古、世界は霧と沈黙のみだった。創世神「廻神（めぐりがみ）」が自らの心臓を打ち砕き、その破片が大地と海になった。心臓の最後の鼓動が「天鋼」として今も空から降り続けているという。
    ongoing_mystery: 近頃、各地で「逆回りの時計」が発見されている。それを手にした者は過去の記憶を一つ失い、代わりに見知らぬ風景の夢を見る。夢の中の場所は実在するのか、何者が時計を配っているのか、誰も解き明かせていない
    factions:
    - name: 鋼心院
      description: 鋼心湖を管理する宗教・技術組織。天鋼の採掘権と精霊信仰の両方を司る。外部には友好的だが、湖底の秘密については固く口を閉ざす
      symbol: 歯車を抱いた蓮の花
    - name: 影刻商会
      description: 闇市場を牛耳る商人集団。正規ルートでは手に入らない禁制品や情報を扱う。敵ではないが、必ず代価を要求する
      symbol: ひび割れた懐中時計
    - name: 雷鳴鍛冶組合
      description: 黒鉄嶺の鍛冶師たちの組合。天鋼加工の秘術を独占し、他地域への技術流出を厳しく取り締まる。誇り高く排他的
      symbol: 稲妻を纏う槌
