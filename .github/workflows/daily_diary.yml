# .github/workflows/daily_diary.yml
# ─────────────────────────────────────────────
# AI旅日記 毎日自動実行ワークフロー
# 毎日 日本時間 AM 7:00 に実行（UTC 22:00）

name: 🌍 AI旅日記 毎日自動投稿

on:
  schedule:
    - cron: "0 22 * * *"   # UTC 22:00 = JST 07:00
  workflow_dispatch:        # 手動実行ボタンも有効化

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # Node.js 24を使用

jobs:
  post-diary:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. リポジトリをチェックアウト ──
      - name: 📥 Checkout
        uses: actions/checkout@v4

      # ── 2. Python セットアップ ──
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. 依存パッケージインストール ──
      - name: 📦 Install dependencies
        run: pip install anthropic pyyaml python-dotenv requests openai tweepy

      # ── 4. world_bible.yaml をキャッシュから復元 ──
      - name: 💾 Restore world_bible cache
        uses: actions/cache@v4
        with:
          path: world_bible.yaml
          key: world-bible-v1

      # ── 5. world_bible.yaml がなければ生成 ──
      - name: 🌍 Generate World Bible (初回のみ)
        if: ${{ !hashFiles('world_bible.yaml') }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_world.py

      # ── 6. メインパイプライン実行 ──
      - name: 🚀 Run diary pipeline
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:             ${{ secrets.OPENAI_API_KEY }}
          META_ACCESS_TOKEN:          ${{ secrets.META_ACCESS_TOKEN }}
          META_INSTAGRAM_ACCOUNT_ID:  ${{ secrets.META_INSTAGRAM_ACCOUNT_ID }}
          IMGBB_API_KEY:              ${{ secrets.IMGBB_API_KEY }}
          X_API_KEY:                  ${{ secrets.X_API_KEY }}
          X_API_SECRET:               ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN:             ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET:      ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          PINTEREST_ACCESS_TOKEN:     ${{ secrets.PINTEREST_ACCESS_TOKEN }}
          PINTEREST_BOARD_ID:         ${{ secrets.PINTEREST_BOARD_ID }}
        run: python orchestrator.py --sns instagram

      # ── 7. ログをアーティファクトとして保存 ──
      - name: 📋 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diary-logs-${{ github.run_number }}
          path: logs/
          retention-days: 30

      # ── 8. 失敗時にIssueを自動作成 ──
      - name: 🚨 Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              title: `❌ AI旅日記 自動投稿失敗 - ${new Date().toLocaleDateString('ja-JP')}`,
              body:  `実行番号: #${context.runNumber}\n確認: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['bug', 'automated']
            })